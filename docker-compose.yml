services:
  umlbot:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    env_file:
      - .env
    environment:
      UMLBOT_SINGLE_CONTAINER: "true"
      UMLBOT_CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "3000:3000"
      - "7860:7860"
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
