services:
  umlbot:
    build: .
    environment:
      PYTHONUNBUFFERED: 1
      UMLBOT_PLANTUML_JAR_PATH: /opt/plantuml/plantuml.jar
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
