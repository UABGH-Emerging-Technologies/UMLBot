services:
  umlbot:
    build:
      context: .
      dockerfile: Docker/Dockerfile
    env_file:
      - .env
    environment:
      UMLBOT_SINGLE_CONTAINER: "true"
      UMLBOT_CORS_ALLOW_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
    ports:
      - "3000:3000"
      - "7860:7860"
      - "8080:8080"
    restart: unless-stopped
