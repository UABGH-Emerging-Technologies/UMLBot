name: Build and push umlbot-api

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ secrets.UMLBOTAPI_REGISTRY_USERNAME }}
          password: ${{ secrets.UMLBOTAPI_REGISTRY_PASSWORD }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/uabgh-emerging-technologies/umlbot-api:latest
            ghcr.io/uabgh-emerging-technologies/umlbot-api:${{ github.sha }}
